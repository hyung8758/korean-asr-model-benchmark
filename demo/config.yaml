server:
  backend_host: 127.0.0.1
  backend_port: 16000
  frontend_host: 0.0.0.0
  frontend_port: 41301
  gunicorn_workers: 1
  ssl:
    enabled: 1
    auto_generate: 1
    cert_file: certs/demo.crt
    key_file: certs/demo.key
    hosts: auto
  security:
    cors_origins: []
    hide_access_log_paths:
      - /api/engine-status
    max_upload_mb: 100
    max_audio_duration_seconds: 1200
    max_active_sessions: 3

resources:
  gpu_indices: [0, 1, 2, 3, 4, 5]

workers:
  host: 127.0.0.1
  base_port: 17000
  parallel_preload: 3
  startup_timeout_seconds: 30
  load_timeout_seconds: 600

engines:
  - id: openai_whisper_large_v3
    name: OpenAI Whisper
    provider: OpenAI Whisper
    kind: openai_whisper
    model: large-v3
    precision: fp16

  - id: faster_whisper_large_v3
    name: faster-whisper
    provider: faster-whisper
    kind: faster_whisper
    model: large-v3
    compute_type: float16

  - id: whisper_cpp_server_large_v3
    name: whisper.cpp
    provider: whisper.cpp
    kind: whisper_cpp_server
    model: large-v3-q5_0
    server:
      host: 127.0.0.1
      port: 8100
      binary: third_party/whisper.cpp/build/bin/whisper-server
      model_path: third_party/whisper.cpp/models/ggml-large-v3-q5_0.bin
      threads: 4
      processors: 1
      flash_attention: 0

  - id: qwen3_speech_recognition
    name: Qwen3-ASR
    provider: Qwen
    kind: qwen_speech_recognition
    model: Qwen/Qwen3-ASR-1.7B
    precision: bfloat16
    return_timestamps: 0

  - id: huggingface_crisperwhisper
    name: CrisperWhisper
    provider: Hugging Face Transformers
    kind: huggingface_transformers
    model: nyrahealth/CrisperWhisper
    precision: float16

  - id: huggingface_ghost613_korean
    name: ghost613 Korean Whisper
    provider: Hugging Face Transformers
    kind: huggingface_transformers
    model: ghost613/whisper-large-v3-turbo-korean
    precision: float16
    return_timestamps: 0

  - id: whisper_streaming_large_v3
    name: Whisper-Streaming
    provider: UFAL Whisper-Streaming
    kind: whisper_streaming
    model: large-v3
    compute_type: float16
    theme: streaming
    streaming:
      min_chunk_seconds: 1.0
      buffer_trimming_seconds: 15.0
    note: third_party/whisper_streaming OnlineASRProcessor with FasterWhisperASR backend.

defaults:
  language: ko
  beam_size: 1
  temperature: 0.0
  mode: offline
  vad: silero

languages:
  - id: ko
    label: 한국어

vad_options:
  - id: silero
    label: Silero

recording:
  chunk_ms: 1000
  sample_rate: 16000

streaming:
  partial_interval_seconds: 1.0
  min_partial_audio_seconds: 1.0
  status_poll_interval_ms: 1000

vad:
  silero:
    padding_ms: 300
    min_speech_ms: 250
    min_silence_ms: 500
    threshold: 0.5

ui:
  mode_change_feedback_ms: 1000
